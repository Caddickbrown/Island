<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Town</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }

    #hud {
      position: fixed;
      bottom: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 16px;
      border-radius: 10px;
      pointer-events: none;
      line-height: 1.6;
      backdrop-filter: blur(6px);
    }
    #hud .hint {
      opacity: 0.7;
      font-size: 12px;
    }

    #title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Georgia', serif;
      font-size: 22px;
      letter-spacing: 2px;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 24px;
      border-radius: 10px;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

<div id="title">Island Town</div>
<div id="hud">
  <div id="pos">Position: 0, 0</div>
  <div class="hint">WASD to move &middot; Shift to sprint &middot; Space to jump &middot; click to lock mouse</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { buildScene, AREAS, initEconomy, tryPickupItem, tryGiveItem,
           updateSupplyChain, updateRadio, toggleRadio, isNearBoombox,
           updateNotification, showNotification } from './scene.js';
  import { PlayerController } from './player.js';
  import { NPCManager, findOpenShift, startSubInShift, updateSubIn } from './npcs.js';
  import { WildlifeManager } from './wildlife.js';
  import { AnimalManager } from './animals.js';

  // --- Renderer ---
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  // --- Scene ---
  const scene = new THREE.Scene();

  // Sky gradient — warm golden-hour feel
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 1;
  skyCanvas.height = 256;
  const skyCtx = skyCanvas.getContext('2d');
  const grad = skyCtx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#7ec8e3');    // top — soft blue
  grad.addColorStop(0.5, '#c9e8f5');  // mid — light
  grad.addColorStop(0.85, '#fde8c9'); // warm peach
  grad.addColorStop(1, '#f0a868');    // horizon — golden
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 1, 256);
  const skyTexture = new THREE.CanvasTexture(skyCanvas);
  skyTexture.magFilter = THREE.LinearFilter;
  scene.background = skyTexture;

  // Fog for cosy atmosphere
  scene.fog = new THREE.FogExp2(0xd4e8f0, 0.0015);

  // --- Camera ---
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 1500);

  // --- Build world ---
  const { windmill, clouds, campfire, colliders, fish, boombox } = buildScene(scene);

  // --- Player ---
  const playerCtrl = new PlayerController(scene, camera, renderer);
  playerCtrl.setColliders(colliders);

  // --- Economy ---
  initEconomy();

  // --- NPCs ---
  const npcManager = new NPCManager(scene);

  // --- Wildlife ---
  const wildlifeManager = new WildlifeManager(scene);

  // --- Farm animals & apiary ---
  const animalManager = new AnimalManager(scene);

  // --- HUD ---
  const posEl = document.getElementById('pos');
  const titleEl = document.getElementById('title');

  // Build area list once for nearest-area lookup
  const areaList = Object.values(AREAS); // [{x, z, label}, ...]
  let lastAreaLabel = '';

  function getNearestArea(px, pz) {
    let nearest = areaList[0];
    let nearestDist = Infinity;
    for (const area of areaList) {
      const d = Math.sqrt((px - area.x) ** 2 + (pz - area.z) ** 2);
      if (d < nearestDist) {
        nearestDist = d;
        nearest = area;
      }
    }
    return nearest.label;
  }

  // --- Game loop ---
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1); // cap delta to avoid jumps

    playerCtrl.update(delta);
    npcManager.update(delta, playerCtrl.player.position);
    wildlifeManager.update(delta);
    animalManager.update(delta);

    // Sim time scalar: 1 real second = 1 game minute (1/60 sim hour)
    const simDelta = delta / 60;
    updateSupplyChain(delta, simDelta);
    updateRadio(delta);
    updateNotification(delta);

    // Sub-in shift completion check
    const subInResult = updateSubIn(delta);
    if (subInResult) {
      showNotification(subInResult);
    }

    // Windmill blade rotation
    if (windmill?.userData?.spinner) {
      windmill.userData.spinner.rotation.z += 0.55 * delta;
    }

    // Campfire flicker — scale + sway flames, vary light intensity
    if (campfire?.userData?.flames) {
      const ft = clock.getElapsedTime();
      const flicker = 0.9 + Math.sin(ft * 9.1) * 0.07 + Math.sin(ft * 13.7) * 0.04;
      campfire.userData.flames.scale.setScalar(flicker);
      campfire.userData.flames.position.x = Math.sin(ft * 7.3) * 0.04;
      campfire.userData.flames.position.z = Math.sin(ft * 5.9) * 0.04;
      if (campfire.userData.fireLight) {
        campfire.userData.fireLight.intensity = 1.8 + Math.sin(ft * 11.0) * 0.4 + Math.sin(ft * 7.0) * 0.2;
      }
    }

    // Fish swim — lazy elliptical orbits, tail wag, face direction of travel
    for (const f of fish) {
      const d = f.userData;
      d.t += delta * d.spd;
      const t = d.t;
      const nx = d.hx + Math.sin(t          ) * d.rX;
      const ny = d.hy + Math.sin(t * 0.53 + d.phase * 0.7) * d.rY;
      const nz = d.hz + Math.cos(t          ) * d.rZ;
      f.position.set(nx, ny, nz);
      // Velocity xz → facing angle
      const vx = Math.cos(t) * d.rX;
      const vz = -Math.sin(t) * d.rZ;
      f.rotation.y = Math.atan2(vx, vz);
      // Tail wag side-to-side
      d.tail.rotation.y = Math.sin(t * 7) * 0.40;
    }

    // Cloud drift
    for (const cloud of clouds) {
      cloud.position.x += cloud.userData.vx * delta;
      cloud.position.z += cloud.userData.vz * delta;
      if (cloud.position.x >  420) cloud.position.x = -420;
      if (cloud.position.x < -420) cloud.position.x =  420;
      if (cloud.position.z >  420) cloud.position.z = -420;
      if (cloud.position.z < -420) cloud.position.z =  420;
    }

    // Update HUD
    const p = playerCtrl.player.position;
    posEl.textContent = `Position: ${p.x.toFixed(0)}, ${p.z.toFixed(0)}`;

    // Update area title
    const areaLabel = getNearestArea(p.x, p.z);
    if (areaLabel !== lastAreaLabel) {
      lastAreaLabel = areaLabel;
      titleEl.textContent = areaLabel;
    }

    renderer.render(scene, camera);
  }

  animate();

  // --- Resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- E key interactions ---
  // Priority order:
  //   1. Near boombox → toggle radio
  //   2. Near open shift → sub-in prompt
  //   3. Mini-game trigger → open mini-game (handled by PlayerController if present)
  //   4. Near NPC with inventory → try give item
  //   5. Else → try pick up item from world
  window.addEventListener('keydown', (e) => {
    if (e.code !== 'KeyE') return;

    const playerPos = playerCtrl.player.position;

    // 1. Boombox / radio
    if (isNearBoombox(playerPos)) {
      toggleRadio();
      return;
    }

    // 2. Job sub-in
    const shift = findOpenShift(npcManager.npcs, playerPos);
    if (shift) {
      const msg = startSubInShift(shift.npcName);
      showNotification(msg);
      return;
    }

    // 3. Mini-game (PlayerController owns this if it exists)
    if (playerCtrl.miniGame && playerCtrl.miniGame.tryOpen) {
      if (playerCtrl.miniGame.tryOpen(playerPos)) return;
    }

    // 4. Near NPC — try to give an item
    let nearestNPC = null;
    let nearestDist = Infinity;
    for (const npc of npcManager.npcs) {
      const d = npc.group.position.distanceTo(playerPos);
      if (d < nearestDist) { nearestDist = d; nearestNPC = npc; }
    }
    if (nearestNPC && nearestDist < 8) {
      if (tryGiveItem(nearestNPC.name, nearestNPC.group.position, playerPos)) return;
    }

    // 5. Pick up item from world
    tryPickupItem(playerPos);
  });
</script>

</body>
</html>
